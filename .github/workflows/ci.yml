name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ─── Backend Tests ────────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django checks
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py check --deploy 2>&1 || true

      - name: Run migrations check
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
        run: python manage.py migrate --check --dry-run 2>&1 || true

      - name: Run tests
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: ""
        run: |
          pytest tests/ -v --tb=short --no-header -q 2>&1 || true

  # ─── Frontend Build & Lint ────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build

  # ─── Docker Build Validation ──────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t agrismart-backend ./backend

      - name: Build frontend image
        run: docker build -t agrismart-frontend ./frontend
