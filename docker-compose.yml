version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: krishisaarthi-backend
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - ./backend/media:/app/media
      - ./backend/logs:/app/logs
      - ./backend/ml_models:/app/ml_models
      - ./backend/db.sqlite3:/app/db.sqlite3
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - krishisaarthi-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: krishisaarthi-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - krishisaarthi-network

  db:
    image: postgres:15-alpine
    container_name: krishisaarthi-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-krishisaarthi}
      - POSTGRES_USER=${POSTGRES_USER:-krishiuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - krishisaarthi-network

volumes:
  postgres_data:

networks:
  krishisaarthi-network:
    driver: bridge
